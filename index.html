<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <main class="container">

        <!-- seccion que muestra el login -->
        <section id="login-section" class="card">
            <h1>Inicar Sesión</h1>

            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" placeholder="Ingrese su usuario">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Ingrese su contraseña">
            </div>

            <button id="login-btn">Ingresar</button>
            <p id="login-message"></p>

        </section>

        <!-- seccion de dashboard de tareas administrador -->
        <section id="admin-section" class="hidden">
            <div class="card top-bar">
                <div>
                    <h1>Dashboard Administrador</h1>
                    <p id="welcome-admin"></p>
                </div>
                <button id="logout-btn" class="btn-logout">Cerrar sesión</button>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Total tareas</h3>
                    <p id="total-tasks">0</p>
                </div>
                <div class="stat-card">
                    <h3>Pendientes</h3>
                    <p id="pending-tasks">0</p>
                </div>
                <div class="stat-card">
                    <h3>Completadas</h3>
                    <p id="completed-tasks">0</p>
                </div>
                <div class="stat-card">
                    <h3>Vencidas</h3>
                    <p id="overdue-tasks">0</p>
                </div>
            </div>

            <div class="card">
                <h2>Filtros</h2>
                <div class="filters-grid">
                    <div class="form-group">
                        <label for="filter-state">Filtrar por estado</label>
                        <select id="filter-state">
                            <option value="Todas">Todas</option>
                            <option value="Pendiente">Pendiente</option>
                            <option value="Completada">Completada</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="filter-user">Filtrar por usuario</label>
                        <select id="filter-user">
                            <option value="Todos">Todos</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>Listado general de tareas</h2>
                <div class="task-container">
                    <div id="task-list"></div>
                </div>
            </div>

            <!-- FUNCION AGREGAR TAREAS -->
            <div class="card">
                <h2>Agregar tarea</h2>

                <form id="task-form">
                    <div class="filters-grid">
                        <div class="form-group">
                            <label for="task-title">Título</label>
                            <input type="text" id="task-title" placeholder="Ingrese el título de la tarea">
                        </div>

                        <div class="form-group">
                            <label for="task-date">Fecha de vencimiento</label>
                            <input type="date" id="task-date">
                        </div>

                        <div class="form-group">
                            <label for="task-user">Asignar a usuario</label>
                            <select id="task-user"></select>
                        </div>
                    </div>

                    <button type="submit">Guardar tarea</button>
                    <p id="task-message"></p>
                </form>
            </div>

        </section>

        <!-- SECCION DE VISTA DEL USUARIO NORMAL -->
        <section id="user-section" class="hidden">
            <div class="card top-bar">
                <div>
                    <h1>Mis tareas</h1>
                    <p id="welcome-user"></p>
                </div>
                <button id="logout-user-btn" class="btn-logout">Cerrar sesión</button>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Total</h3>
                    <p id="user-total">0</p>
                </div>
                <div class="stat-card">
                    <h3>Pendientes</h3>
                    <p id="user-pending">0</p>
                </div>
                <div class="stat-card">
                    <h3>Completadas</h3>
                    <p id="user-completed">0</p>
                </div>
                <div class="stat-card">
                    <h3>Vencidas</h3>
                    <p id="user-overdue">0</p>
                </div>
            </div>

            <div class="card">
                <h2>Filtros</h2>

                <div class="form-group">
                    <label for="user-filter-state">Filtrar por estado</label>
                    <select id="user-filter-state">
                        <option value="Todas">Todas</option>
                        <option value="Pendiente">Pendiente</option>
                        <option value="Completada">Completada</option>
                    </select>
                </div>
            </div>

            <div class="card">
                <h2>Mis tareas</h2>
                <div class="task-container">
                    <div id="user-task-list"></div>
                </div>
            </div>
        </section>
    </main>


    <script src="./js/storage.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/app.js"></script>
    <script src="./js/tasks.js"></script>
    <script src="./js/dom.js"></script>
</body>

</html>
